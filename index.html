<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard | AI-Powered Phishing Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-animated"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <h1>PhishGuard</h1>
            </div>
            <p class="subtitle">Real-time ML & NLP URL Analysis</p>
        </header>

        <main>
            <div class="scanner-box glass-panel">
                <h2>Analyze URL</h2>
                <form id="scan-form">
                    <div class="input-group">
                        <input type="text" id="url-input" placeholder="Enter URL to scan (e.g., https://example.com)" required autocomplete="off">
                        <button type="submit" id="scan-btn">
                            <span class="btn-text">Scan Now</span>
                            <div class="spinner hidden"></div>
                        </button>
                    </div>
                </form>
            </div>

            <div id="results-container" class="results-box glass-panel hidden">
                <div class="result-header">
                    <h3 id="result-title">Scan Results</h3>
                    <div id="risk-badge" class="badge">Safe</div>
                </div>
                
                <div class="risk-meter-container">
                    <div class="risk-info">
                        <span>Risk Score</span>
                        <span id="risk-score-value">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="risk-progress" class="progress-bar-fill"></div>
                    </div>
                </div>

                <div class="features-breakdown">
                    <h4>Feature Analysis</h4>
                    <ul id="features-list">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Powered by Advanced Machine Learning & Natural Language Processing</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
